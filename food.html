<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qspahhtjkwbwnlhvceni.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KyvrI6oR3SB6QNC2O10efw_-tgOyzZ7';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沖繩自駕趣 - 美食推薦魔法師</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #D32F2F; --secondary: #FFC107; --bg: #F4F6F8;
            --white: #FFFFFF; --text: #333; --light-text: #666; --star: #FFD700;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; }
        body { background-color: #e0e5ec; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background-color: var(--bg); min-height: 100vh; position: relative; padding-bottom: 30px; }
        header { background: linear-gradient(135deg, var(--primary), #b71c1c); color: white; padding: 25px 20px; text-align: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        header h1 { font-size: 22px; margin-bottom: 5px; }
        .controls, .add-form-card { padding: 15px; background: white; margin: -10px 15px 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .add-form-card { margin-top: 15px; background: #fffdeb; border: 1px dashed var(--primary); }
        .form-title { font-size: 14px; font-weight: bold; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
        .form-input.full { grid-column: span 2; }
        .btn-add { width: 100%; padding: 8px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 15px; background: #eee; border-radius: 20px; font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .chip.active { background: var(--primary); color: white; border-color: var(--primary); }
        .sort-select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #f9f9f9; }
        .food-list { padding: 0 15px; }
        .food-card { background: var(--white); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; position: relative; transition: 0.3s; border-left: 5px solid transparent; cursor: pointer; text-decoration: none; color: inherit; }
        .food-card.遊客推薦 { border-left-color: #2196F3; }
        .food-card.當地人推薦 { border-left-color: #4CAF50; }
        .food-card.評價推薦 { border-left-color: #FF9800; }
        .food-card.自訂新增 { border-left-color: #8b5cf6; }
        .food-info { flex: 1; }
        .food-header { display: flex; justify-content: space-between; align-items: flex-start; padding-right: 40px; }
        .food-tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 5px; }
        .tag-遊客 { background: #E3F2FD; color: #1976D2; }
        .tag-當地 { background: #E8F5E9; color: #2E7D32; }
        .tag-評價 { background: #FFF3E0; color: #E65100; }
        .tag-自訂 { background: #F3E8FF; color: #6b21a8; }
        .btn-card-del { position: absolute; top: 12px; right: 12px; background: #fee2e2; color: #ef4444; border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; z-index: 10; }
        .food-name { font-size: 16px; font-weight: bold; color: var(--text); margin-bottom: 4px; }
        .food-desc { font-size: 12px; color: var(--light-text); line-height: 1.4; margin-bottom: 8px; }
        .food-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f0f0f0; padding-top: 8px; }
        .food-price { color: var(--primary); font-weight: bold; font-size: 14px; }
        .food-loc { font-size: 11px; color: #999; }
        .back-home { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: white; width: 50px; height: 50px; border-radius: 25px; display: flex; justify-content: center; align-items: center; text-decoration: none; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 100; }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h1><i class="fas fa-utensils"></i> 沖繩美食推薦魔法師</h1>
        <p>點擊餐廳卡片可開啟 Google Maps 導航</p>
    </header>

    <!-- 新增自訂美食區塊 -->
    <div class="add-form-card">
        <div class="form-title"><i class="fas fa-plus-circle"></i> 自由新增想吃的美食餐廳</div>
        <div class="form-grid">
            <input type="text" id="addName" class="form-input" placeholder="餐廳名稱 (必填)">
            <input type="text" id="addArea" class="form-input" placeholder="地區 (例如: 那霸市)">
            <input type="number" id="addPrice" class="form-input" placeholder="價位 JPY (例如: 1500)">
            <select id="addType" class="form-input">
                <option value="阿古豬與肉類">阿古豬/石垣牛</option>
                <option value="沖繩麵與在地">沖繩麵/海鮮</option>
                <option value="海景甜點咖啡">海景/甜點</option>
            </select>
            <input type="text" id="addDesc" class="form-input full" placeholder="美味特色簡述">
            <input type="text" id="addMapUrl" class="form-input full" placeholder="🔗 貼上 Google 地圖網址 (選填)">
        </div>
        <button class="btn-add" onclick="customAddFood()">✨ 確認新增至美食清單</button>
    </div>

    <div class="controls">
        <div class="filter-row" id="filterRow">
            <div class="chip active" onclick="filterCat('全部')">全部</div>
            <div class="chip" onclick="filterCat('阿古豬與肉類')">🥩 阿古豬/石垣牛</div>
            <div class="chip" onclick="filterCat('沖繩麵與在地')">🍜 沖繩麵/海鮮</div>
            <div class="chip" onclick="filterCat('海景甜點咖啡')">☕ 海景/甜點</div>
        </div>
        <select class="sort-select" id="sortSelect" onchange="renderFood()">
            <option value="popularity">🔥 按熱門度排序 (推薦等級)</option>
            <option value="price_low">💰 價位：由低到高</option>
            <option value="price_high">💎 價位：由高到低</option>
        </select>
    </div>
    <div class="food-list" id="foodList"></div>
    <a href="index.html" class="back-home"><i class="fas fa-home"></i></a>
</div>
<script>
    // 1. 初始化 Supabase
    const SUPABASE_URL = 'https://qspahhtjkwbwnlhvceni.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KyvrI6oR3SB6QNC2O10efw_-tgOyzZ7';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. 預設的核心美食資料庫
    const defaultFoodDB = [
        { id: "d1", name: "百年古家 大家", type: "阿古豬與肉類", cat: "遊客推薦", area: "名護市", price: 3500, desc: "在百年琉球古民家裡享受頂級阿古豬涮涮鍋，氣氛滿分", weight: 1, mapUrl: "" },
        // ... 其他預設餐廳資料 ...
    ];

    let customFoodDB = [];
    let currentCat = '全部';

    // 3. 網頁載入與即時監聽
    window.onload = async () => {
        await loadCloudFood();
        supabase.channel('food_realtime').on('postgres_changes', { event: '*', table: 'trip_settings' }, () => {
            loadCloudFood();
        }).subscribe();
    };

    async function loadCloudFood() {
        const { data } = await supabase.from('trip_settings').select('custom_food').eq('id', 1).single();
        if (data && data.custom_food) {
            customFoodDB = data.custom_food;
        }
        renderFood();
    }


    // 📍 填在這裡！【自訂新增美食的函數邏輯】
    async function customAddFood() {
        const name = document.getElementById('addName').value.trim();
        if(!name) return alert('請輸入餐廳名稱！');
        
        const newFood = {
            id: "custom_" + Date.now(),
            name: name,
            type: document.getElementById('addType').value,
            cat: "自訂新增",
            area: document.getElementById('addArea').value.trim() || "沖繩",
            price: parseInt(document.getElementById('addPrice').value) || 0,
            desc: document.getElementById('addDesc').value.trim() || "自訂加入的私房口袋名單",
            weight: 0,
            mapUrl: document.getElementById('addMapUrl').value.trim()
        };

        customFoodDB.push(newFood);
        
        // 儲存上雲端（如果剛剛有去後台關閉 RLS 權限，這裡就能一秒寫入成功！）
        const { error } = await supabase.from('trip_settings').upsert({ id: 1, custom_food: customFoodDB });
        if(!error) {
            alert('🛍️ 美食已成功同步至雲端，全員即時可見！');
            // 清空輸入框
            document.getElementById('addName').value = '';
            document.getElementById('addArea').value = '';
            document.getElementById('addPrice').value = '';
            document.getElementById('addDesc').value = '';
            document.getElementById('addMapUrl').value = '';
            renderFood();
        } else {
            alert('雲端儲存失敗，請確認 Supabase 的 RLS 是否已關閉：' + error.message);
        }
    }


    // 4. 後續的其他函數（刪除、過濾、渲染等）
    async function deleteFood(id, e) {
        e.preventDefault(); e.stopPropagation();
        if(confirm('確定要從雲端刪除此項目嗎？（所有人畫面的此項目都會消失喔）')) {
            customFoodDB = customFoodDB.filter(item => item.id !== id);
            await supabase.from('trip_settings').upsert({ id: 1, custom_food: customFoodDB });
            renderFood();
        }
    }

    function filterCat(cat) {
        // ... 過濾邏輯 ...
    }

    function renderFood() {
        // ... 畫面渲染邏輯 ...
    }
</script>
</body>
</html>
