<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沖繩自駕趣 - 智慧行程排程器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://qspahhtjkwbwnlhvceni.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KyvrI6oR3SB6QNC2O10efw_-tgOyzZ7'; 
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <style>
        :root { --primary: #1e3a8a; --secondary: #ea580c; --bg: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Helvetica Neue', Arial, '微軟正黑體', sans-serif; }
        body { background-color: #e2e8f0; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 800px; background: #fff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 30px; }
        header { background: linear-gradient(135deg, #d32f2f, #b71c1c); color: white; padding: 20px; text-align: center; }
        .form-section { padding: 20px; border-bottom: 6px solid var(--bg); display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #333; }
        .form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .selector-section { padding: 20px; }
        .custom-add-box { background: #fffbeb; border: 1px dashed #ea580c; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .custom-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 8px; margin-bottom: 8px; }
        .city-accordion { margin-bottom: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .city-header { padding: 12px; background: #f1f5f9; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; color: #b71c1c; }
        .city-content { display: none; padding: 15px; max-height: 500px; overflow-y: auto; }
        .city-content.active { display: block; }
        .cat-title { font-size: 14px; color: var(--secondary); font-weight: bold; margin: 15px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 3px;}
        .spot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; margin-top:10px; }
        .spot-item { padding: 30px 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 12px; text-align: center; transition: 0.2s; position: relative; background: #fff; }
        .spot-item.active { border-color: var(--secondary); background: #fff7ed; font-weight: bold; border-width: 2px; }
        .btn-spot-del { position: absolute; top: 4px; right: 4px; background: #fee2e2; color: #ef4444; border: none; font-size: 9px; padding: 2px 4px; border-radius: 4px; cursor: pointer; z-index: 5; }
        .fd-toggle-btn { position: absolute; top: 6px; left: 6px; font-size: 10px; padding: 3px 6px; border-radius: 4px; background: #e2e8f0; color: #64748b; }
        .btn-main { width: 100%; padding: 15px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .result-container { padding: 20px; display: none; }
        .day-block { margin-bottom: 30px; border: 1px solid #e2e8f0; border-radius: 10px; }
        .day-header { padding: 12px 15px; background: #333; color: white; font-weight: bold; border-radius: 10px 10px 0 0; }
        .timeline { padding: 20px; position: relative; padding-left: 45px; }
        .timeline::before { content: ''; position: absolute; left: 24px; top: 20px; bottom: 20px; width: 3px; background: #cbd5e1; }
        .node { position: relative; margin-bottom: 25px; padding: 15px; border-radius: 8px; background: #fff; border: 1px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
        .node:hover { background: #f8fafc; border-color: #cbd5e1; }
        .node::before { content: ''; position: absolute; left: -28px; top: 20px; width: 14px; height: 14px; background: #fff; border: 4px solid var(--secondary); border-radius: 50%; z-index: 2; }
        .node-time { font-size: 14px; font-weight: bold; color: #475569; background: #f1f5f9; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 8px;}
        .node-title { font-size: 16px; font-weight: bold; color: #0f172a; margin-bottom: 5px; }
        .status-tag { font-size: 11px; padding: 3px 6px; border-radius: 4px; font-weight: bold; display: inline-block; }
        .status-ok { background: #dcfce7; color: #166534; }
        .transit { font-size: 12px; color: #64748b; margin: 15px 0 15px 10px; font-weight: bold; }
        .node-ctrl { display: flex; gap: 5px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #cbd5e1; }
        .c-btn { border: 1px solid #cbd5e1; background: #fff; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h2 style="margin:0;"><i class="fas fa-shuttle-van"></i> 沖繩自駕行程神隊友</h2>
        <p style="margin:5px 0 0; font-size:13px; opacity:0.9;">點擊產生後的行程卡片可直接導航至 Google 地圖</p>
    </header>
    <div class="form-section">
        <div class="form-group"><label>航班抵達 (OKA)</label><input type="time" id="arrTime" value="11:50"></div>
        <div class="form-group"><label>航班離開 (OKA)</label><input type="time" id="depTime" value="13:00"></div>
        <div class="form-group">
            <label>主要住宿區域</label>
            <select id="hotel">
                <option value="那霸市區">那霸市區 (國際通/首里城方便)</option>
                <option value="恩納村">恩納村 (中北部度假海景飯店)</option>
            </select>
        </div>
        <div class="form-group"><label>總天數</label><input type="number" id="days" value="5" min="1" max="15"></div>
    </div>
    <div class="selector-section">
        <!-- 自由新增自訂景點表單 -->
        <div class="custom-add-box">
            <div style="font-size:14px; font-weight:bold; color:#ea580c; margin-bottom:8px;"><i class="fas fa-map-pin"></i> 新增自訂私房景點</div>
            <div class="custom-grid">
                <input type="text" id="cName" placeholder="景點名稱 (必填)">
                <select id="cRegion">
                    <option value="北部地區 (名護/本部)">北部地區</option>
                    <option value="中部地區 (恩納/美國村)">中部地區</option>
                    <option value="南部地區 (那霸/瀨長島)">南部地區</option>
                </select>
                <input type="number" id="cStay" placeholder="停留小時 (如: 1.5)" step="0.5">
                <input type="text" id="cMapUrl" placeholder="🔗 貼上 Google 地圖網址 (選填)">
            </div>
            <button onclick="addCustomSpot()" style="padding:6px 12px; background:#ea580c; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px;">➕ 新增至下方清單</button>
        </div>

        <div id="accordion"></div>
        <button class="btn-main" onclick="initPlanner()">✨ 開始智慧自駕排程 (沖繩縱貫線)</button>
        <button id="btnCloud" class="btn-main" style="background: #059669; margin-top: 10px;" onclick="saveToCloud()">💾 同步到雲端 (存檔)</button>
    </div>
    <div class="result-container" id="resultArea"></div>
</div>
<script>
    const masterDB = {
        "北部地區 (名護/本部)": { "經典必去景點": [ {name:"美麗海水族館", stay:3.5, open:"08:30", close:"18:30", city:"北部", mapUrl:""}, {name:"古宇利大橋/心形岩", stay:2, open:"00:00", close:"23:59", city:"北部", mapUrl:""}, {name:"萬座毛", stay:1, open:"08:00", close:"19:00", city:"北部", mapUrl:""} ] },
        "中部地區 (恩納/美國村)": { "休閒與逛街商圈": [ {name:"美國村 Depot Island", stay:3, open:"10:00", close:"22:00", city:"中部", mapUrl:""}, {name:"殘波岬燈塔", stay:1, open:"09:00", close:"17:30", city:"中部", mapUrl:""}, {name:"蝦蝦飯 Kouri Shrimp", stay:1.5, open:"11:00", close:"18:00", city:"中部", mapUrl:""} ] },
        "南部地區 (那霸/瀨長島)": { "古蹟與免稅購物": [ {name:"國際通商圈", stay:2.5, open:"11:00", close:"23:00", city:"南部", mapUrl:""}, {name:"瀨長島 Umikaji Terrace", stay:2, open:"10:00", close:"21:00", city:"南部", mapUrl:""}, {name:"首里城公園", stay:2, open:"08:30", close:"18:00", city:"南部", mapUrl:""} ] }
    };

    let userCustomSpots = JSON.parse(localStorage.getItem('okinawa_custom_spots')) || [];
    let selectedSet = new Set();
    let scheduledDays = []; 
    let config = {};

    function addCustomSpot() {
        const name = document.getElementById('cName').value.trim();
        if(!name) return alert('請輸入景點名稱！');
        const region = document.getElementById('cRegion').value;
        const stay = parseFloat(document.getElementById('cStay').value) || 1.0;
        const mapUrl = document.getElementById('cMapUrl').value.trim();

        const newSpot = { name, stay, open:"09:00", close:"21:00", city: region.substring(0,2), mapUrl, isCustom: true, id: Date.now() };
        userCustomSpots.push(newSpot);
        localStorage.setItem('okinawa_custom_spots', JSON.stringify(userCustomSpots));
        
        document.getElementById('cName').value = '';
        document.getElementById('cStay').value = '';
        document.getElementById('cMapUrl').value = '';
        renderSelection();
    }

    function deleteCustomSpot(id, e) {
        e.stopPropagation();
        if(confirm('確定移除此自訂景點嗎？')) {
            userCustomSpots = userCustomSpots.filter(s => s.id !== id);
            localStorage.setItem('okinawa_custom_spots', JSON.stringify(userCustomSpots));
            renderSelection();
        }
    }

    function renderSelection() {
        const target = document.getElementById('accordion');
        target.innerHTML = '';
        
        // 複製一份結構來塞自訂景點
        let displayDB = JSON.parse(JSON.stringify(masterDB));
        userCustomSpots.forEach(s => {
            const key = Object.keys(displayDB).find(k => k.startsWith(s.city));
            if(key) {
                if(!displayDB[key]["自訂私房景點"]) displayDB[key]["自訂私房景點"] = [];
                displayDB[key]["自訂私房景點"].push(s);
            }
        });

        for (const [region, categories] of Object.entries(displayDB)) {
            const div = document.createElement('div'); div.className = 'city-accordion';
            div.innerHTML = `<div class="city-header" onclick="this.nextElementSibling.classList.toggle('active')"><span>${region}</span> <i class="fas fa-chevron-down"></i></div>`;
            const content = document.createElement('div'); content.className = 'city-content';
            for (const [catName, spots] of Object.entries(categories)) {
                if(spots.length === 0) continue;
                const catTitle = document.createElement('div'); catTitle.className = 'cat-title'; catTitle.innerText = catName;
                content.appendChild(catTitle);
                const grid = document.createElement('div'); grid.className = 'spot-grid';
                spots.forEach(s => {
                    const item = document.createElement('div'); 
                    item.className = 'spot-item';
                    
                    // 如果是自訂，加刪除按鈕
                    if(s.isCustom) {
                        const delBtn = document.createElement('button');
                        delBtn.className = 'btn-spot-del';
                        delBtn.innerText = '❌';
                        delBtn.onclick = (e) => deleteCustomSpot(s.id, e);
                        item.appendChild(delBtn);
                    }

                    const info = document.createElement('div');
                    info.innerHTML = `<div>${s.name}</div><div style="font-size:10px; color:#888; margin-top:3px;">停留 ${s.stay}h</div>`;
                    
                    // 點擊選取邏輯
                    let isSelected = Array.from(selectedSet).some(sel => sel.name === s.name);
                    if(isSelected) item.classList.add('active');
                    
                    item.onclick = () => { 
                        item.classList.toggle('active'); 
                        let found = Array.from(selectedSet).find(sel => sel.name === s.name);
                        if(found) selectedSet.delete(found); else selectedSet.add(s);
                    };
                    item.appendChild(info); grid.appendChild(item);
                });
                content.appendChild(grid);
            }
            div.appendChild(content); target.appendChild(div);
        }
    }

    function t2m(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; }
    function m2t(m) { let h = Math.floor(m / 60) % 24; let min = Math.round(m % 60); return `${String(h).padStart(2, '0')}:${String(min).padStart(2, '0')}`; }
    function getTransitMins(f, t) { return f===t ? 20 : 45; }

    function initPlanner() {
        if(selectedSet.size === 0) return alert("請勾選想去的景點！");
        config = { arr: document.getElementById('arrTime').value, dep: document.getElementById('depTime').value, hotel: document.getElementById('hotel').value, days: parseInt(document.getElementById('days').value) };
        let spots = Array.from(selectedSet).map(s => ({...s}));
        scheduledDays = Array.from({length: config.days}, () => []);
        
        for (let i = 0; i < config.days; i++) {
            let currentMins = (i === 0) ? t2m(config.arr) + 60 : t2m("09:00");
            let dayLimit = (i === config.days - 1) ? t2m(config.dep) - 150 : t2m("20:30"); 
            let currentLoc = (i === 0) ? "機" : "南";
            let spotIdx = 0;
            while (spotIdx < spots.length) {
                let spot = spots[spotIdx];
                let transit = getTransitMins(currentLoc, spot.city);
                let arrivalMins = currentMins + transit;
                let endMins = arrivalMins + (spot.stay * 60);
                if (endMins <= dayLimit) {
                    scheduledDays[i].push(spot);
                    currentMins = endMins; currentLoc = spot.city; spots.splice(spotIdx, 1); 
                } else { spotIdx++; }
            }
        }
        document.getElementById('resultArea').style.display = 'block';
        renderResult();
    }

    function adjust(d, s, val) { scheduledDays[d][s].stay = Math.max(0.5, scheduledDays[d][s].stay + val); renderResult(); }
    function move(d, s, dir) { 
        if(s+dir < 0 || s+dir >= scheduledDays[d].length) return;
        [scheduledDays[d][s], scheduledDays[d][s+dir]] = [scheduledDays[d][s+dir], scheduledDays[d][s]]; 
        renderResult(); 
    }
    function del(d, s) { scheduledDays[d].splice(s, 1); renderResult(); }

    function openMap(name, customUrl) {
        const url = customUrl ? customUrl : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' 沖繩')}`;
        window.open(url, '_blank');
    }

    function renderResult() {
        const target = document.getElementById('resultArea');
        let html = '<h3><i class="fas fa-clipboard-check"></i> 沖繩自駕行程表 (點擊卡片可開啟導航)</h3>';
        for (let d = 0; d < config.days; d++) {
            html += `<div class="day-block"><div class="day-header">第 ${d+1} 天</div><div class="timeline">`;
            let now = (d === 0) ? t2m(config.arr) + 60 : t2m("09:00");
            let loc = (d === 0) ? "機" : "南";
            if (d === 0) html += `<div class="node" onclick="openMap('那霸機場','')"><div class="node-time">${m2t(now)}</div><div class="node-title">🚗 OKA 機場取車自駕出發</div></div>`;
            scheduledDays[d].forEach((spot, sIdx) => {
                let trans = getTransitMins(loc, spot.city); now += trans; 
                html += `<div class="transit"><i class="fas fa-car"></i> 自駕前往下個點 (約 ${trans} 分鐘)</div>`;
                let end = now + (spot.stay * 60);
                html += `
                    <div class="node" onclick="openMap('${spot.name}', '${spot.mapUrl || ''}')">
                        <div class="node-time">${m2t(now)} - ${m2t(end)}</div>
                        <div class="node-title"><i class="fas fa-map-marker-alt" style="color:#ea580c;margin-right:5px;"></i>${spot.name}</div>
                        <div class="status-tag status-ok">🗺️ 點擊開啟地圖導航</div>
                        <div class="node-ctrl" onclick="event.stopPropagation()">
                            <button class="c-btn" onclick="adjust(${d}, ${sIdx}, -0.5)">-30m</button>
                            <span style="font-size:12px; font-weight:bold; margin:0 5px;">停留 ${spot.stay}h</span>
                            <button class="c-btn" onclick="adjust(${d}, ${sIdx}, 0.5)">+30m</button>
                            <button class="c-btn" onclick="move(${d}, ${sIdx}, -1)">↑</button>
                            <button class="c-btn" onclick="move(${d}, ${sIdx}, 1)">↓</button>
                            <button class="c-btn" onclick="del(${d}, ${sIdx})" style="color:red;">刪除</button>
                        </div>
                    </div>
                `;
                now = end; loc = spot.city;
            });
            html += `</div></div>`;
        }
        target.innerHTML = html;
    }

    async function saveToCloud() {
    const btn = document.getElementById('btnCloud');
    btn.innerText = "正在儲存...";
    
    // 改用整數 id: 1 進行覆蓋存檔，避免 UUID 格式衝突被資料庫拒絕
    const { error } = await sb.from('saved_itinerary').upsert({
        id: 1, 
        config: config,
        selected_spots: Array.from(selectedSet),
        schedule: scheduledDays
    });
    
    if(!error) {
        alert("✅ 沖繩行程已完美同步至雲端，旅伴重新整理就看得到囉！");
    } else {
        alert("儲存失敗，請檢查資料庫權限：" + error.message);
    }
    btn.innerText = "💾 同步到雲端 (存檔)";
}

async function loadFromCloud() {
    // 統一讀取 id: 1 的雲端行程
    const { data, error } = await sb.from('saved_itinerary').select('*').eq('id', 1).maybeSingle();
    if (data) {
        config = data.config || {};
        selectedSet = new Set(data.selected_spots);
        renderSelection();
        if (data.schedule && data.schedule.length > 0) {
            scheduledDays = data.schedule;
            document.getElementById('resultArea').style.display = 'block';
            renderResult();
        }
    }
}
</script>
</body>
</html>
